<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="centered-layout">

            <div class="auth-header-icon mb-3">🛰️</div>
            <h1 class="h4 fw-bold text-white mb-2">Searching for Opponent</h1>

            <div class="d-flex justify-content-center gap-2">

            </div>
        </div>
    </div>

</html>
