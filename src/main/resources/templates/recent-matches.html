<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="d-flex flex-column min-vh-100">

    {{> components/navbar}}

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold mb-0">My Recent Matches</h1>
            <div class="btn-group">
                <button type="button" class="btn btn-outline-muted btn-sm active">All</button>
                <button type="button" class="btn btn-outline-muted btn-sm">Wins</button>
                <button type="button" class="btn btn-outline-muted btn-sm">Losses</button>
            </div>
        </div>

        <div class="card border-secondary shadow-sm">
            <div class="table-responsive">
                <table class="table mb-0 align-middle text-nowrap">
                    <thead>
                        <tr class="text-secondary small text-uppercase">
                            <th scope="col" class="ps-4">Match ID</th>
                            <th scope="col">My Bot</th>
                            <th scope="col">Opponent</th>
                            <th scope="col">Result</th>
                            <th scope="col">Date</th>
                            <th scope="col" class="text-end pe-4">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="ps-4 text-secondary">#4021</td>
                            <td>AlphaBot</td>
                            <td class="text-secondary">BetaMaster</td>
                            <td><span class="badge badge-soft-success rounded-pill px-3">Win</span></td>
                            <td class="text-secondary">2 mins ago</td>
                            <td class="text-end pe-4">
                                <a href="/matches/stats" class="btn btn-sm btn-outline-muted">View</a>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4 text-secondary">#4018</td>
                            <td>Randomizer</td>
                            <td class="text-secondary">AlphaBot</td>
                            <td><span class="badge badge-soft-danger rounded-pill px-3">Loss</span></td>
                            <td class="text-secondary">45 mins ago</td>
                            <td class="text-end pe-4">
                                <a href="/matches/stats" class="btn btn-sm btn-outline-muted">View</a>
                            </td>
                        </tr>
                        <tr>
                            <td class="ps-4 text-secondary">#4014</td>
                            <td>PaperMaster</td>
                            <td class="text-secondary">Roshambo_X</td>
                            <td><span class="badge bg-secondary rounded-pill px-3">Draw</span></td>
                            <td class="text-secondary">Yesterday</td>
                            <td class="text-end pe-4">
                                <a href="/matches/stats" class="btn btn-sm btn-outline-muted">View</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    {{> components/scripts}}
</body>

</html>
