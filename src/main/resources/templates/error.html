<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="centered-layout">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <h1 class="error-code mb-4">404</h1>
                <h2 class="h3 fw-bold mb-3">Something's missing</h2>
                <p class="text-secondary lead mb-4">
                    The page you are looking for doesn't exist or has been moved.
                    Unless you were looking for this error page, in which case: Congrats! You found it.
                </p>
                <a href="/" class="btn btn-primary px-4 py-2 me-2">Go Home</a>
                <a href="#" class="btn btn-outline-muted px-4 py-2">Report Issue</a>
            </div>
        </div>
    </div>

    {{> components/scripts}}
</body>

</html>
