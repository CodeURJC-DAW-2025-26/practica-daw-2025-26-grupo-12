<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="d-flex flex-column min-vh-100">

    {{> components/navbar}}

    <div class="container py-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <p class="text-secondary mb-1 small text-uppercase">Administration</p>
                <h1 class="h3 fw-bold mb-0">Tournament Admin</h1>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">
                        <h2 class="h5 fw-bold mb-0">Managed Tournaments</h2>
                        <div class="d-flex flex-wrap gap-2 align-items-center">
                            <span id="admin-tournament-counter" class="badge bg-secondary">Showing {{fromItem}}-{{toItem}}
                                of {{totalElements}}</span>
                            <a href="/admin/tournament/create" class="btn btn-outline-muted btn-sm">New
                                Tournament</a>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0 align-middle text-nowrap">
                            <thead>
                                <tr class="text-secondary small text-uppercase">
                                    <th scope="col" class="ps-3">Tournament</th>
                                    <th scope="col">Status</th>
                                    <th scope="col" class="text-end pe-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="admin-tournament-table-body"></tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-center mt-3">
                        <button id="show-more-admin-tournaments-btn" class="btn btn-outline-muted btn-sm"
                            data-load-more="tournaments" data-endpoint="/admin/panel/page"
                            data-body-id="admin-tournament-table-body" data-counter-id="admin-tournament-counter"
                            data-meta-class="admin-tournament-meta-row"
                            data-size="{{size}}">
                            Show more
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <div class="row g-4 mt-1">
            <div class="col-12">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h5 fw-bold mb-0">Registered Users (Monthly)</h2>
                        <span class="badge bg-secondary">Histogram</span>
                    </div>
                    <div class="bg-secondary-bg border border-secondary rounded p-4">
                        <svg viewBox="0 0 360 160" width="100%" height="160" role="img"
                            aria-label="Histogram of registered users by month">
                            <line x1="30" y1="10" x2="30" y2="140" stroke="#334155" stroke-width="1"></line>
                            <line x1="30" y1="140" x2="340" y2="140" stroke="#334155" stroke-width="1"></line>

                            <rect x="50" y="90" width="24" height="50" fill="#3b82f6"></rect>
                            <rect x="90" y="75" width="24" height="65" fill="#3b82f6"></rect>
                            <rect x="130" y="60" width="24" height="80" fill="#3b82f6"></rect>
                            <rect x="170" y="45" width="24" height="95" fill="#3b82f6"></rect>
                            <rect x="210" y="70" width="24" height="70" fill="#3b82f6"></rect>
                            <rect x="250" y="85" width="24" height="55" fill="#3b82f6"></rect>
                            <rect x="290" y="65" width="24" height="75" fill="#3b82f6"></rect>

                            <text x="50" y="155" fill="#94a3b8" font-size="10">Aug</text>
                            <text x="90" y="155" fill="#94a3b8" font-size="10">Sep</text>
                            <text x="130" y="155" fill="#94a3b8" font-size="10">Oct</text>
                            <text x="170" y="155" fill="#94a3b8" font-size="10">Nov</text>
                            <text x="210" y="155" fill="#94a3b8" font-size="10">Dec</text>
                            <text x="250" y="155" fill="#94a3b8" font-size="10">Jan</text>
                            <text x="290" y="155" fill="#94a3b8" font-size="10">Feb</text>
                        </svg>
                        <div class="d-flex flex-wrap gap-2 mt-3">
                            <span class="badge bg-secondary">Peak: Nov</span>
                            <span class="badge bg-secondary">Latest: Feb</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    {{> components/scripts}}
    <script src="/js/paginated-tournaments.js"></script>
</body>

</html>
