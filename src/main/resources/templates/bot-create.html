<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="d-flex flex-column min-vh-100">

    {{> components/navbar}}

    <div class="container py-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <p class="text-secondary mb-1 small text-uppercase">My Bots</p>
                <h1 class="h3 fw-bold mb-0">Edit Bot</h1>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a href="/bots/detail/{{bot.id}}" class="btn btn-outline-muted btn-sm">Back to Bot</a>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="card p-4">
                    <h2 class="h5 fw-bold mb-3">Bot Settings</h2>
                    <form method="post" action="/bots/edit/{{bot.id}}" enctype="multipart/form-data">
                        <input type="hidden" name="_csrf" value="{{_csrf.token}}">
                        
                        <input type="file" id="realBotImage" name="imageFile" accept="image/*" class="d-none">

                        <div class="row g-3">
                            <div class="col-md-7">
                                <label for="botName" class="form-label text-uppercase small">Bot Name</label>
                                <input type="text" class="form-control form-control-lg" id="botName" name="name"
                                    value="{{bot.name}}" required>
                            </div>
                            <div class="col-md-5">
                                <label for="visibility" class="form-label text-uppercase small">Visibility</label>
                                <select class="form-select form-control-lg" id="visibility" name="isPublic">
                                    <option value="true" {{#bot.isPublic}} selected {{/bot.isPublic}}>Public</option>
                                    <option value="false" {{^bot.isPublic}} selected {{/bot.isPublic}}>Private</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label for="tags" class="form-label text-uppercase small">Tags</label>
                                <input type="text" class="form-control form-control-lg" id="tags" name="tags"
                                    value="{{#bot.tags}}{{.}},{{/bot.tags}}"
                                    placeholder="Add multiple tags separated by commas">
                            </div>
                            <div class="col-12">
                                <label for="description" class="form-label text-uppercase small">Description</label>
                                <textarea class="form-control form-control-lg" id="description" name="description"
                                    rows="4">{{bot.description}}</textarea>
                            </div>
                            <div class="col-12">
                                <label for="code" class="form-label text-uppercase small">Bot Code</label>
                                <textarea class="form-control form-control-lg font-monospace" id="code" name="code"
                                    rows="8">{{bot.code}}</textarea>
                            </div>
                            <div class="col-12 d-flex flex-wrap gap-2 mt-2">
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                                <button type="reset" class="btn btn-outline-muted">Discard</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card p-4 mb-4 text-center">
                    <h2 class="h5 fw-bold mb-3">Bot Image</h2>
                    <div class="mx-auto" style="width: 96px; height: 96px;">
                        {{#bot.image}}
                            <img src="/bot-images/{{bot.id}}" class="rounded-circle border border-primary w-100 h-100" style="object-fit: cover;">
                        {{/bot.image}}
                        {{^bot.image}}
                            <div class="rounded-circle bg-primary d-flex align-items-center justify-content-center text-white display-6 fw-bold w-100 h-100">
                                {{initial}}
                            </div>
                        {{/bot.image}}
                    </div>
                    <div id="fileNameDisplay" class="text-info small mt-2"></div>
                    <button class="btn btn-outline-muted btn-sm mt-3" data-bs-toggle="modal"
                        data-bs-target="#botImageModal">
                        <span id="btnText">Change Image</span>
                    </button>
                </div>
                </div>
        </div>
    </div>

    {{> components/scripts}}

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const modalInput = document.getElementById('modalFileInput');
            const realInput = document.getElementById('realBotImage');
            const confirmBtn = document.getElementById('confirmImageBtn');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const btnText = document.getElementById('btnText');

            confirmBtn.addEventListener('click', function () {
                if (modalInput.files.length > 0) {
                    realInput.files = modalInput.files;
                    const fileName = modalInput.files[0].name;
                    fileNameDisplay.textContent = "Selected: " + fileName;
                    btnText.textContent = "Change Image";
                }
            });
        });
    </script>

    <div class="modal fade" id="botImageModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-secondary-bg border border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Edit Bot Image</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input class="form-control" type="file" id="modalFileInput" accept="image/*">
                    <div class="form-text text-secondary">PNG, JPG up to 2MB.</div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-muted" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" id="confirmImageBtn" class="btn btn-primary" data-bs-dismiss="modal">Confirm</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
