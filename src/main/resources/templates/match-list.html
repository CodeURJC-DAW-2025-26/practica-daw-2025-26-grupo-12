<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="d-flex flex-column min-vh-100">

    {{> components/navbar}}

    <div class="container py-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <p class="text-secondary mb-1 small text-uppercase">Leaderboard</p>
                <h1 class="h3 fw-bold mb-0">Best Matches</h1>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center gap-3 mb-3 flex-wrap">
                <h2 class="h5 fw-bold mb-0">Match List</h2>
                <span id="match-counter" class="text-secondary small">Showing {{fromItem}}-{{toItem}} of
                    {{totalElements}}</span>
            </div>
            <div class="table-responsive">
                <table class="table mb-0 align-middle text-nowrap">
                    <thead>
                        <tr class="text-secondary small text-uppercase">
                            <th scope="col" class="ps-4">Match ID</th>
                            <th scope="col">Player 1</th>
                            <th scope="col">Player 2</th>
                            <th scope="col">Top ELO</th>
                            <th scope="col">Result</th>
                            <th scope="col">Date</th>
                            <th scope="col" class="text-end pe-4">Action</th>
                        </tr>
                    </thead>
                    <tbody id="match-table-body"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-center mt-3">
                <button id="show-more-matches-btn" class="btn btn-outline-muted btn-sm"
                    data-load-more="matches" data-endpoint="/matches/list/page"
                    data-body-id="match-table-body" data-counter-id="match-counter"
                    data-meta-class="match-meta-row" data-size="{{size}}">
                    Show more
                </button>
            </div>
        </div>
    </div>

    {{> components/scripts}}
    <script src="/js/paginated-tournaments.js"></script>
</body>

</html>
