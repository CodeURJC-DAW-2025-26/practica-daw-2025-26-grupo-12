# HTTPS Profile Configuration
server.port=${SERVER_PORT:8443}
server.http.port=${SERVER_HTTP_PORT:8080}
server.ssl.enabled=true
server.ssl.key-store=${SERVER_SSL_KEY_STORE:classpath:keystore.p12}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:potato}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:scissors-please}
