{{#tournaments}}
<tr class="admin-tournament-row">
	<td class="ps-3" style="width: 60px;">
		{{#hasImage}}
		<div class="rounded overflow-hidden bg-light d-flex align-items-center justify-content-center"
			style="width: 48px; height: 48px;">
			<img src="/tournament-images/{{id}}" alt="{{name}}" class="w-100 h-100 object-fit-cover">
		</div>
		{{/hasImage}}
		{{^hasImage}}
		<div class="rounded bg-primary d-flex align-items-center justify-content-center text-white fw-bold"
			style="width: 48px; height: 48px;">
			T
		</div>
		{{/hasImage}}
	</td>
	<td>
		<div class="fw-medium">{{name}}</div>
		<div class="text-secondary small text-truncate" style="max-width: 300px;">{{summary}}</div>
	</td>
	<td>
		<span class="badge bg-dark border border-secondary text-secondary">{{occupiedSlots}}/{{totalSlots}}</span>
	</td>
	<td>
		<span class="badge {{badgeClass}}">{{status}}</span>
	</td>
	<td class="text-end pe-3">
		<div class="d-flex flex-wrap gap-2 justify-content-end">
			<a
				href="/tournaments/detail/{{id}}"
				class="btn btn-outline-muted btn-sm"
				>View</a
			>
			<a
				href="/admin/tournaments/edit/{{id}}"
				class="btn btn-outline-muted btn-sm"
				>Edit</a
			>
			<button
				type="button"
				class="btn btn-outline-danger btn-sm"
				data-bs-toggle="modal"
				data-bs-target="#deleteTournamentModal"
				data-tournament-id="{{id}}"
				data-tournament-name="{{name}}"
			>
				Delete
			</button>
		</div>
	</td>
</tr>
{{/tournaments}} {{#showEmpty}}
<tr class="admin-tournament-empty-row">
	<td class="ps-3 text-secondary" colspan="5">No tournaments available.</td>
</tr>
{{/showEmpty}}
