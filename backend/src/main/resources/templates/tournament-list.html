<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="d-flex flex-column min-vh-100">

    {{> components/navbar}}

    <div class="container py-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <p class="text-secondary mb-1 small text-uppercase">Season 2026</p>
                <h1 class="h3 fw-bold mb-0">Tournaments</h1>
            </div>
        </div>

        <div class="card p-4 mb-4">
            <form id="tournament-search-form" method="get" action="/tournaments" class="row g-3 align-items-center">
                <div class="col-lg-9">
                    <label for="tournament-search" class="form-label text-uppercase small mb-1">Search tournaments</label>
                    <input id="tournament-search" type="search" name="q" class="form-control"
                        placeholder="Search by tournament name..." value="{{searchQuery}}" autocomplete="off">
                </div>
                <div class="col-lg-3 d-grid d-lg-flex justify-content-lg-end gap-2">
                    <button type="submit" class="btn btn-primary btn-sm px-3 mt-lg-4">Search</button>
                    <a href="/tournaments" class="btn btn-outline-muted btn-sm px-3 mt-lg-4">Clear</a>
                </div>
            </form>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center gap-3 mb-3 flex-wrap">
                        <h2 class="h5 fw-bold mb-0">Tournament List</h2>
                        <span id="tournament-counter" class="text-secondary small">Showing {{fromItem}}-{{toItem}} of
                            {{totalElements}}</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0 align-middle text-nowrap">
                            <thead>
                                <tr class="text-secondary small text-uppercase">
                                    <th scope="col" class="ps-3" style="width: 60px;">Image</th>
                                    <th scope="col">Tournament</th>
                                    <th scope="col">Slots</th>
                                    <th scope="col">Status</th>
                                    <th scope="col" class="text-end pe-3">Action</th>
                                </tr>
                            </thead>
                            <tbody id="tournament-table-body">{{> components/tournament-page-chunk}}</tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-center mt-3">
                        <button id="show-more-tournaments-btn" class="btn btn-outline-muted btn-sm"
                            {{^hasMore}}hidden{{/hasMore}}>
                            Show more
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    {{> components/scripts}}
    <script src="/js/tournament-list.js"></script>
</body>

</html>
