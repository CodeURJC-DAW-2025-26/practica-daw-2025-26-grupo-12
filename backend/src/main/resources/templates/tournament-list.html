<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

{{> components/head}}

<body class="d-flex flex-column min-vh-100">

    {{> components/navbar}}

    <div class="container py-5">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
            <div>
                <p class="text-secondary mb-1 small text-uppercase">Season 2026</p>
                <h1 class="h3 fw-bold mb-0">Tournaments</h1>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center gap-3 mb-3 flex-wrap">
                        <h2 class="h5 fw-bold mb-0">Tournament List</h2>
                        <span id="tournament-counter" class="text-secondary small">Showing {{fromItem}}-{{toItem}} of
                            {{totalElements}}</span>
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0 align-middle text-nowrap">
                            <thead>
                                <tr class="text-secondary small text-uppercase">
                                    <th scope="col" class="ps-3" style="width: 60px;">Image</th>
                                    <th scope="col">Tournament</th>
                                    <th scope="col">Status</th>
                                    <th scope="col" class="text-end pe-3">Action</th>
                                </tr>
                            </thead>
                            <tbody id="tournament-table-body"></tbody>
                        </table>
                    </div>
                    <div class="d-flex justify-content-center mt-3">
                        <button id="show-more-tournaments-btn" class="btn btn-outline-muted btn-sm"
                            data-load-more="tournaments" data-endpoint="/tournaments/page"
                            data-body-id="tournament-table-body" data-counter-id="tournament-counter"
                            data-meta-class="tournament-meta-row" data-size="{{size}}">
                            Show more
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    {{> components/scripts}}
    <script src="/js/pageable.js"></script>
</body>

</html>
